name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so setuptools-scm can resolve a real version instead
          # of falling back to the placeholder.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with test and TOML extras
        run: python -m pip install -e ".[test,toml]"

      - name: Run tests
        run: pytest -v

  build-check:
    name: Verify package builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*
